<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile • Academic Debate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script>
      if (!localStorage.getItem("adp_token")) location.replace("/login.html");
    </script>
  </head>
  <body>
    <div id="navbarMount"></div>

    <main class="container" style="padding:22px 0">
      <div class="two-col">
        <section class="card pad" style="border-radius:24px">
          <div class="row" style="align-items:flex-start">
            <div class="avatar" id="profileAvatar" style="width:72px;height:72px;border-radius:50%;background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: white; display:flex; align-items:center; justify-content:center; font-size: 32px; font-weight:bold;"></div>
            <div>
              <h2 style="margin:0;font-size:24px;" id="name">Profile</h2>
              <div class="muted2" style="margin-top:4px;font-size:14px" id="meta"></div>
              <div id="bioDisplay" style="margin-top:12px;font-size:15px;line-height:1.5;max-width:500px;"></div>
              <div class="row" style="margin-top:16px;flex-wrap:wrap">
                <span class="badge good" id="repBadge">rep 0</span>
                <span class="badge" id="roleBadge">user</span>
              </div>
            </div>
            <div class="spacer"></div>
            <a href="/settings.html" class="btn btn-sm btn-ghost">Edit Profile</a>
        </section>

      </div>

      <section class="card pad" style="border-radius:24px;margin-top:14px">
        <div class="row">
          <h2 style="margin:0">Participation</h2>
          <div class="spacer"></div>
          <span class="badge" id="argCount">0 args</span>
        </div>
        <div class="grid" id="partMount" style="margin-top:12px"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/profile.js"></script>
  </body>
</html>
