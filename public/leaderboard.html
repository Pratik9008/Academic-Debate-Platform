<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard • Academic Debate</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .leaderboard-row {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .leaderboard-row:hover {
      background: var(--bg1);
    }

    .rank-badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      margin-right: 16px;
    }

    .rank-1 {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
    }

    .rank-2 {
      background: linear-gradient(135deg, #9ca3af, #6b7280);
      color: #fff;
    }

    .rank-3 {
      background: linear-gradient(135deg, #d97706, #b45309);
      color: #fff;
    }

    .rank-other {
      background: var(--bg2);
      color: var(--fg1);
    }

    .score-display {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent1);
    }
  </style>
</head>

<body>
  <div id="navbarMount"></div>

  <main class="container pad" style="max-width: 800px; margin-top: 40px;">
    <div style="text-align: center; margin-bottom: 40px;">
      <h1
        style="font-size: 42px; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        Global Leaderboard</h1>
      <p class="muted">Top debaters ranked by their total AI match scores.</p>
    </div>

    <div class="card pad" style="border-radius: 24px; padding: 0; overflow: hidden;">
      <div id="leaderboardMount">
        <div style="padding: 40px; text-align: center;" class="muted">Loading rankings...</div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/pages/leaderboard.js"></script>
</body>

</html>
