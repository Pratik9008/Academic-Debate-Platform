<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Debates • Academic Debate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script>
      if (!localStorage.getItem("adp_token")) location.replace("/login.html");
    </script>
  </head>
  <body>
    <div id="navbarMount"></div>

    <main class="container" style="padding:22px 0">
      <div class="card pad" style="border-radius:24px">
        <div class="row" style="flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:min(500px,92vw)">
            <div class="tag"><i></i> Exploration</div>
            <h2 style="margin:10px 0 0">All Debates</h2>
            <div class="muted" style="margin-top:6px;line-height:1.55">
              Browse through all active, upcoming, and completed debates.
            </div>
          </div>
          <div class="row" style="flex-wrap:wrap;justify-content:flex-end">
            <select class="input" id="statusFilter" style="width:180px">
              <option value="all">All Status</option>
              <option value="live">🔴 Live</option>
              <option value="upcoming">⏳ Upcoming</option>
              <option value="completed">🏆 Ended/Completed</option>
            </select>
            <select class="input" id="catFilter" style="width:180px">
              <option value="">All Categories</option>
              <option>Science</option>
              <option>Tech</option>
              <option>Politics</option>
            </select>
            <button class="btn btn-primary" id="applyBtn">Apply Filters</button>
          </div>
        </div>
      </div>

      <section class="section">
        <div class="debate-list" id="debatesMount"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/all-debates.js"></script>
  </body>
</html>
