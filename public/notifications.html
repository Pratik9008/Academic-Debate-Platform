<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notifications • Academic Debate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script>
      if (!localStorage.getItem("adp_token")) location.replace("/login.html");
    </script>
  </head>
  <body>
    <div id="navbarMount"></div>

    <main class="container" style="padding:40px 0; max-width: 600px;">
      <section class="card pad" style="border-radius:24px">
        <div class="row" style="margin-bottom: 20px;">
          <h1 style="margin:0">Notifications</h1>
          <button class="btn btn-sm btn-ghost" id="markReadBtn" style="margin-left:auto;font-size:12px;">Mark all read</button>
        </div>
        <div id="notifMount" style="display: flex; flex-direction: column; gap: 10px;">
          <div class="muted" style="text-align: center; padding: 20px;">Loading notifications...</div>
        </div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/notifications.js"></script>

</html>
